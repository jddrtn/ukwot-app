<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login</title>
  <style>
    body
    {font-family:system-ui;margin:0;background:#f5f6f8;display:flex;min-height:100vh;align-items:center;justify-content:center;}
    .card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:18px;width:380px;}
    .field{margin-bottom:12px;}
    label{display:block;font-size:13px;margin-bottom:6px;color:#374151;}
    input{width:100%;padding:10px;border:1px solid #d1d5db;border-radius:10px;}
    .btn{width:100%;padding:10px;border-radius:10px;border:1px solid #111827;background:#111827;color:#fff;}
    .muted{color:#6b7280;font-size:13px;}
  </style>
</head>
<body>
  <div class="card">
    <h2 style="margin:0 0 6px;">Login</h2>
    <p class="muted" style="margin:0 0 14px;">UKWOT App Dashboard</p>

    {% if form.errors %}
      <p class="muted">Invalid username or password.</p>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="field">
        <label>Username</label>
        {{ form.username }}
      </div>
      <div class="field">
        <label>Password</label>
        {{ form.password }}
      </div>
      <button class="btn" type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>
