<!doctype html>
<html lang="en">
<head>
  <!--
    Base dashboard layout
    - Used by all authenticated pages (list/forms/etc.)
    - Provides sidebar navigation + topbar + space for the main content
  -->
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}UKWOT Dashboard{% endblock %}</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
:root{
  --bg: #3C9A24;
  --panel: #EAF4E7;
  --border: #e5e7eb;
  --text: #111827;
  --muted: #6b7280;
  --sidebar: #1C6D07;
  --sidebar-active: #3c9a24;
  --sidebar-text: #cbd5e1;
  --radius: 14px;

  /* Typography */
  --font-body: "DM Sans", system-ui, sans-serif;
  --font-heading: "Crimson Text", Georgia, serif;
}

    /* ---------- Base page styling ---------- */
 body{
  margin: 0;
  font-family: var(--font-body);
  color: var(--text);
  background: var(--bg);
}

 /* Headings use serif font */
h1, h2, h3, h4{
  font-family: var(--font-heading);
  letter-spacing: 0.2px;
}

    /* ---------- Overall dashboard layout ---------- */
    .layout{
      display: flex;
      min-height: 100vh;
    }

    /* ---------- Sidebar ---------- */
    .sidebar{
      width: 240px;
      background: var(--sidebar);
      color: #fff;
      padding: 18px 14px;
      box-sizing: border-box;
      flex-shrink: 0;
    }

    .brand{
  font-family: var(--font-heading);
  font-weight: 700;
  font-size: 18px;
  margin-bottom: 14px;
}

    .nav a{
      display: block;
      color: var(--sidebar-text);
      text-decoration: none;
      padding: 10px 10px;
      border-radius: 10px;
      margin: 4px 0;
    }

    .nav a.active{
      background: var(--sidebar-active);
      color: #fff;
    }

    /* ---------- Main content area ---------- */
    .content{
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0; /* prevents overflow issues */
    }

    /* ---------- Topbar ---------- */
    .topbar{
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      background: var(--panel);
    }

    /* ---------- Page wrapper ---------- */
    .page{
      padding: 18px;
    }

    /* ---------- Reusable card / text styles ---------- */
   .card{
  background:#F3F8F2;
  border:1px solid #D7E7D2;
  border-radius:var(--radius);
  padding:16px;
}
   .card{
  box-shadow:0 4px 14px rgba(28,109,7,0.05);
}
   .stat-card{
  background:#EAF4E7;
  border:1px solid #CFE6C8;
}

   .stat-number{
  font-size:32px;
  font-weight:700;
  color:#1C6D07;
}
    .muted{
      color: var(--muted);
      font-size: 13px;
    }

    /* ---------- Buttons ---------- */
    .btn{
      display: inline-block;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--text);
      background: var(--text);
      color: #fff;
      text-decoration: none;
      cursor: pointer;
      box-sizing: border-box;
      transition: background 0.2s ease, border-color 0.2s ease;
    }

    .btn.secondary{
      background: #fff;
      color: var(--text);
    }

    /* Primary action button used for create/search actions */
    .btn.primary{
      background: #1C6D07;
      border: 1px solid #1C6D07;
      color: #fff;
    }

    /* Hover state for primary buttons */
    .btn.primary:hover{
      background: #3C9A24;
      border-color: #3C9A24;
    }

    /* ---------- Form layout ---------- */

    /* Two-column grid layout for forms */
    .form-grid{
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 16px;
    }

    /* Individual form field container */
    .form-group{
      display: flex;
      flex-direction: column;
    }

    /* Labels */
    .form-group label{
      font-size: 13px;
      margin-bottom: 4px;
      color: var(--muted);
    }

    /* Form inputs */
    .form-group input,
    .form-group select{
      padding: 8px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 14px;
      box-sizing: border-box;
      width: 100%;
    }

    /* Button container for forms */
    .form-actions{
      margin-top: 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    /* ---------- Table styling ---------- */

    /* Wrapper allows horizontal scrolling on smaller screens */
    .table-wrap{
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    table{
      width: 100%;
      border-collapse: collapse;
      min-width: 650px; /* keeps columns readable on smaller screens */
    }

    th, td{
      padding: 10px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }

    /* Delete button */
    .btn-danger-link{
      background: none;
      border: none;
      color: #dc2626;
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
    }

    /* Hover highlight */
    tbody tr:hover{
      background: #f9fafb;
    }

    /* Clickable table headings */
    th a{
      text-decoration: none;
      color: var(--text);
      font-weight: 600;
    }

    th a:hover{
      text-decoration: underline;
    }

    /* ---------- Toggle switch ---------- */

    /* Container for the toggle control */
    .toggle{
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      flex-wrap: nowrap;
    }

    /* Hide the default checkbox */
    .toggle input{
      display: none;
    }

    /* Switch background */
    .toggle-slider{
      width: 40px;
      height: 22px;
      background: #e5e7eb;
      border-radius: 999px;
      position: relative;
      transition: background 0.2s ease;
      flex-shrink: 0;
    }

    /* Switch circle */
    .toggle-slider::before{
      content: "";
      width: 16px;
      height: 16px;
      background: white;
      border-radius: 50%;
      position: absolute;
      top: 3px;
      left: 3px;
      transition: transform 0.2s ease;
      border: 1px solid #d1d5db;
    }

    /* Active state */
    .toggle input:checked + .toggle-slider{
      background: #10b981;
    }

    .toggle input:checked + .toggle-slider::before{
      transform: translateX(18px);
    }

    /* ---------- Utility classes for responsive layouts ---------- */

    /* Use this on header/toolbars that should wrap on smaller screens */
    .mobile-stack{
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    /* ---------- Responsive behaviour ---------- */

    /* Tablet and smaller */
    @media (max-width: 900px){
      /* Stack sidebar above page content */
      .layout{
        flex-direction: column;
      }

      /* Make sidebar full width */
      .sidebar{
        width: 100%;
        padding: 14px;
      }

      /* Allow nav links to sit in rows rather than a fixed vertical block */
      .nav{
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .nav a{
        margin: 0;
      }

      /* Let topbar wrap cleanly */
      .topbar{
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
        padding: 12px 14px;
      }

      /* Slightly reduce page padding */
      .page{
        padding: 14px;
      }

      /* Forms collapse to one column */
      .form-grid{
        grid-template-columns: 1fr;
      }

      /* Buttons in form areas wrap more naturally */
      .form-actions{
        flex-direction: column;
        align-items: stretch;
      }
    }

    /* Phone-sized screens */
    @media (max-width: 600px){
      /* Tighter page spacing */
      .page{
        padding: 10px;
      }

      .card{
        padding: 12px;
      }

      /* Make utility rows stack vertically */
      .mobile-stack{
        flex-direction: column;
        align-items: stretch;
      }

      /* Make buttons easier to tap and fill available width */
      .btn{
        width: 100%;
        text-align: center;
      }

      /* Slightly smaller branding area spacing */
      .sidebar{
        padding: 12px;
      }

      .brand{
        margin-bottom: 10px;
      }

      /* Reduce text crowding in the topbar */
      .topbar{
        padding: 10px 12px;
      }
    }
  </style>
</head>

<body>
  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">UKWOT • Admin</div>

      <!-- Sidebar navigation -->
      <nav class="nav">
        <!-- Dashboard link -->
        <a href="{% url 'dashboard_home' %}"
           class="{% if active_page == 'home' %}active{% endif %}">
          Dashboard
        </a>

        <!-- Otters link -->
        <a href="{% url 'otter_list' %}"
           class="{% if active_page == 'otters' %}active{% endif %}">
          Otters
        </a>
      </nav>

      {# Add more links later #}
      {# <a href="{% url 'species_list' %}" class="{% if active_page == 'species' %}active{% endif %}">Species</a> #}
      {# <a href="{% url 'rescue_list' %}" class="{% if active_page == 'rescues' %}active{% endif %}">Rescue Cases</a> #}
    </aside>

    <!-- Main content -->
    <main class="content">

 <header class="topbar">

  <!-- Right side controls -->
  <div style="margin-left:auto;">
    <form method="post" action="{% url 'logout' %}" style="margin:0;">
  {% csrf_token %}
  <button class="btn primary small" type="submit">
    Logout
  </button>
</form>
  </div>

</header>

      <section class="page">
        {# Show Django messages (success/error) after actions like delete #}
        {% if messages %}
          <div style="margin-bottom:12px;">
            {% for message in messages %}
              <div class="card" style="margin-bottom:8px;">
                {{ message }}
              </div>
            {% endfor %}
          </div>
        {% endif %}

        {% block content %}{% endblock %}
      </section>

    </main>
  </div>

  <script>
    // Confirm destructive actions (deleting an otter).
    function confirmDelete(message) {
      return window.confirm(message);
    }
  </script>
</body>
</html>
