{% extends "dashboard/base.html" %}
{% block title %}Otter{% endblock %}

{% block content %}
<div class="card">

  <!-- Page title changes depending on create or edit mode -->
  <h2>
    {% if mode == "create" %}
      Add Otter
    {% else %}
      Edit Otter
    {% endif %}
  </h2>

  <!-- Otter form -->
  <form method="post">
    {% csrf_token %}

    {{ form.as_p }}

    <div style="margin-top:16px; display:flex; gap:10px;">

      <!-- Submit button (Create or Save depending on mode) -->
      <button class="btn" type="submit">
        {% if mode == "create" %}
          Create Otter
        {% else %}
          Save Changes
        {% endif %}
      </button>

      <!-- Back button returns to otter list without submitting form -->
      <a class="btn secondary" href="{% url 'otter_list' %}">
        Back
      </a>

    </div>

  </form>

</div>
{% endblock %}
