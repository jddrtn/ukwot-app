{% extends "dashboard/base.html" %}
{% block title %}Delete Otter{% endblock %}
{% block content %}
  <div class="card" style="max-width:640px;">
    <h2 style="margin:0 0 8px;">Delete Otter</h2>
    <p class="muted">Are you sure you want to delete <strong>{{ object.name }}</strong> (ID {{ object.otter_id }})?</p>

    <form method="post">
      {% csrf_token %}
      <div style="display:flex;gap:10px;margin-top:14px;">
        <button class="btn" type="submit">Yes, delete</button>
        <a class="btn secondary" href="{% url 'otter_list' %}">Cancel</a>
      </div>
    </form>
  </div>
{% endblock %}
